name: Compliance Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f Makefile || (echo "Missing Makefile" && exit 1)
          test -f .github/workflows/ci.yml || test -f .github/workflows/ci.yaml || (echo "Missing CI workflow" && exit 1)
          test -f README.md || (echo "Missing README.md" && exit 1)

      - name: Validate required Makefile targets
        run: |
          grep -q "^test:" Makefile || (echo "Missing make test target" && exit 1)
          grep -q "^format:" Makefile || (echo "Missing make format target" && exit 1)
          grep -q "^lint:" Makefile || (echo "Missing make lint target" && exit 1)
          grep -q "^clean:" Makefile || (echo "Missing make clean target" && exit 1)

      - name: Validate project structure
        run: |
          test -d frontend/src || (echo "Missing frontend/src" && exit 1)
          test -d frontend/tests || (echo "Missing frontend/tests" && exit 1)
          test -d tests/e2e || (echo "Missing tests/e2e" && exit 1)

      - name: Validate pnpm usage
        run: |
          test -f pnpm-lock.yaml || (echo "Missing pnpm-lock.yaml" && exit 1)
          test ! -f package-lock.json || (echo "package-lock.json should not exist" && exit 1)

      - name: Validate pre-commit hooks
        run: |
          test -f .pre-commit-config.yaml || (echo "Missing .pre-commit-config.yaml" && exit 1)

